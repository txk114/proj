<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Vault - Password Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <section id="login-view" class="view active">
            <div class="glass-panel">
                <h1>Local Vault</h1>
                <p>Enter your master password to unlock.</p>
                <form id="login-form">
                    <input type="password" id="master-password" placeholder="Master Password" required>
                    <button type="submit">Unlock</button>
                </form>
            </div>
        </section>

        <!-- Dashboard Screen -->
        <section id="dashboard-view" class="view hidden">
            <header>
                <h2>My Passwords</h2>
                <button id="lock-btn" class="secondary">Lock Vault</button>
            </header>
            <div class="dashboard-content">
                <div class="glass-panel add-password-panel">
                    <h3>Add New Credential</h3>
                    <form id="add-form">
                        <input type="text" id="site-name" placeholder="Website Name" required>
                        <input type="text" id="site-username" placeholder="Username" required>
                        <input type="password" id="site-password" placeholder="Password" required>
                        <button type="submit">Save Credential</button>
                    </form>
                </div>
                <div class="glass-panel vault-list" id="vault-list">
                    <!-- Passwords will be injected here -->
                    <p class="empty-state">No credentials saved yet.</p>
                </div>
            </div>
        </section>
    </div>
    
    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
